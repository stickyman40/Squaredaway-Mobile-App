name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  preflight-and-build:
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Create result bundle directory
        run: mkdir -p TestResults

      - name: Run preflight checks
        run: ./scripts/preflight-check.sh

      - name: Build app
        run: >
          xcodebuild
          -project "SquaredAway.xcodeproj"
          -scheme "SquaredAway"
          -destination "generic/platform=iOS Simulator"
          build

      - name: Run unit tests
        run: >
          xcodebuild
          test
          -project "SquaredAway.xcodeproj"
          -scheme "SquaredAway"
          -only-testing:"SquaredAwayTests"
          -resultBundlePath "TestResults/unit-tests.xcresult"
          -destination "platform=iOS Simulator,name=iPhone 16,OS=18.6"

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-xcresult
          path: TestResults/unit-tests.xcresult
          if-no-files-found: warn
